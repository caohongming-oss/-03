<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="语音翻译">
<link rel="manifest" href="manifest.json">
<title>语音翻译 · Voice Translator</title>
<style>
  :root {
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #16213e;
    --card: #1e1e35;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f8;
    --text2: #9090b0;
    --text3: #5a5a80;
    --accent: #7c6fe0;
    --accent2: #5a4fc8;
    --green: #2dd4a0;
    --green2: #1a9e76;
    --red: #e05a5a;
    --red2: #b83a3a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Status bar */
  .status-bar {
    background: var(--bg2);
    padding: calc(var(--safe-top) + 10px) 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .app-title { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  .mode-toggle {
    display: flex;
    background: var(--bg3);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .mode-btn {
    padding: 5px 14px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent);
    color: white;
    font-weight: 600;
  }

  /* Lang bar */
  .lang-bar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg2);
    gap: 10px;
    flex-shrink: 0;
  }
  .lang-pill {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
  }
  .lang-pill .flag { font-size: 20px; display: block; line-height: 1; }
  .lang-pill .name { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .swap-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text2);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .swap-btn:active { transform: scale(0.9); background: var(--accent2); }

  /* Main content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 12px 16px;
    gap: 10px;
  }

  .text-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    flex-shrink: 0;
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .panel-dot.listening { background: var(--red); animation: blink 0.8s infinite; }
  .panel-dot.translating { background: #f0a030; animation: blink 0.6s infinite; }
  .panel-dot.done { background: var(--green); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .panel-label { font-size: 12px; color: var(--text2); }
  .panel-text {
    font-size: 17px;
    line-height: 1.65;
    color: var(--text);
    min-height: 60px;
    word-break: break-word;
  }
  .panel-text.placeholder { color: var(--text3); font-size: 15px; }
  .panel-text.interim { color: var(--text2); }

  .translation-panel {
    background: linear-gradient(135deg, rgba(124,111,224,0.12), rgba(45,212,160,0.08));
    border-color: rgba(124,111,224,0.25);
  }
  .trans-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.6;
    color: var(--text);
    min-height: 60px;
  }
  .trans-text.placeholder { color: var(--text3); font-size: 15px; font-weight: 400; }

  /* Speak button inline */
  .speak-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
    gap: 8px;
  }
  .speak-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(45,212,160,0.4);
    background: rgba(45,212,160,0.1);
    color: var(--green);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
  }
  .speak-btn:active { background: rgba(45,212,160,0.2); }
  .copy-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
  }

  /* Controls */
  .controls {
    padding: 16px 16px calc(var(--safe-bot) + 16px);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-shrink: 0;
  }
  .clear-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text2);
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:active { background: var(--red2); color: white; }
  .mic-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--red);
    color: white;
    font-size: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(224,90,90,0.4);
  }
  .mic-btn:active { transform: scale(0.94); }
  .mic-btn.listening {
    background: var(--red2);
    box-shadow: 0 0 0 12px rgba(224,90,90,0.15), 0 4px 20px rgba(224,90,90,0.4);
    animation: ripple 1.5s infinite;
  }
  @keyframes ripple {
    0% { box-shadow: 0 0 0 0 rgba(224,90,90,0.3), 0 4px 20px rgba(224,90,90,0.4); }
    70% { box-shadow: 0 0 0 18px rgba(224,90,90,0), 0 4px 20px rgba(224,90,90,0.4); }
    100% { box-shadow: 0 0 0 0 rgba(224,90,90,0), 0 4px 20px rgba(224,90,90,0.4); }
  }
  .hist-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text2);
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* Status text */
  .status-text {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    padding: 4px 0 0;
    flex-shrink: 0;
  }

  /* History overlay */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .overlay-sheet {
    background: var(--bg2);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 75dvh;
    padding: calc(8px) 16px calc(var(--safe-bot) + 16px);
    display: flex;
    flex-direction: column;
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .sheet-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .hist-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .hist-orig { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .hist-trans { font-size: 15px; font-weight: 500; }
  .hist-empty { text-align: center; color: var(--text3); padding: 2rem; font-size: 14px; }

  /* Conversation mode */
  #conv-mode { display: none; flex-direction: column; height: 100%; }
  .conv-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg-group { display: flex; flex-direction: column; gap: 4px; }
  .msg-bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.55;
  }
  .msg-bubble.zh-msg {
    background: var(--card);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg-bubble.en-msg {
    background: var(--accent);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg-sub { font-size: 11px; color: var(--text3); padding: 0 4px; }
  .msg-sub.right { text-align: right; }
  .conv-controls {
    padding: 14px 16px calc(var(--safe-bot) + 14px);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .conv-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .conv-btn-zh {
    background: rgba(124,111,224,0.2);
    color: #b4a8ff;
    border: 1px solid rgba(124,111,224,0.3);
  }
  .conv-btn-zh.active { background: var(--accent); color: white; animation: ripple-btn 1.5s infinite; }
  .conv-btn-en {
    background: rgba(45,212,160,0.15);
    color: var(--green);
    border: 1px solid rgba(45,212,160,0.3);
  }
  .conv-btn-en.active { background: var(--green2); color: white; animation: ripple-btn 1.5s infinite; }
  @keyframes ripple-btn {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.1); }
    50% { box-shadow: 0 0 0 6px rgba(255,255,255,0); }
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: calc(var(--safe-bot) + 90px);
    left: 50%; transform: translateX(-50%);
    background: var(--red2);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  /* Install banner */
  .install-banner {
    background: linear-gradient(135deg, var(--accent2), #2563eb);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .install-banner p { font-size: 13px; flex: 1; }
  .install-banner button {
    background: white;
    color: var(--accent2);
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  .install-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer; padding: 0 4px; }
</style>
</head>
<body>

<!-- Install Banner -->
<div class="install-banner" id="install-banner" style="display:none">
  <p>📲 安装到手机桌面，随时使用</p>
  <button onclick="installApp()">立即安装</button>
  <button class="install-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="app-title">🌐 语音翻译</div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="switchMode('single')">单向</button>
    <button class="mode-btn" onclick="switchMode('conv')">对话</button>
  </div>
</div>

<!-- SINGLE MODE -->
<div id="single-mode" style="display:flex; flex-direction:column; flex:1; overflow:hidden">
  <!-- Lang Bar -->
  <div class="lang-bar">
    <div class="lang-pill">
      <span class="flag" id="src-flag">🇨🇳</span>
      <span class="name" id="src-name">中文</span>
    </div>
    <button class="swap-btn" onclick="swapLang()">⇄</button>
    <div class="lang-pill">
      <span class="flag" id="tgt-flag">🇺🇸</span>
      <span class="name" id="tgt-name">英文</span>
    </div>
  </div>

  <div class="content">
    <!-- Source Panel -->
    <div class="text-panel">
      <div class="panel-header">
        <span class="panel-dot" id="src-dot"></span>
        <span class="panel-label" id="src-label">您说（中文）</span>
      </div>
      <div class="panel-text placeholder" id="src-text">点击下方麦克风开始说话…</div>
    </div>

    <!-- Translation Panel -->
    <div class="text-panel translation-panel">
      <div class="panel-header">
        <span class="panel-dot" id="tgt-dot"></span>
        <span class="panel-label" id="tgt-label">翻译结果（英文）</span>
      </div>
      <div class="trans-text placeholder" id="tgt-text">翻译将在这里显示…</div>
      <div class="speak-row" id="action-row" style="display:none">
        <button class="copy-btn" onclick="copyText()">📋 复制</button>
        <button class="speak-btn" onclick="speakTrans()">🔊 朗读</button>
      </div>
    </div>
  </div>

  <div class="status-text" id="status-text">准备就绪</div>

  <!-- Controls -->
  <div class="controls">
    <button class="clear-btn" onclick="clearAll()" title="清除">🗑</button>
    <button class="mic-btn" id="mic-btn" onclick="toggleListen()">🎙</button>
    <button class="hist-btn" onclick="openHistory()" title="历史">📋</button>
  </div>
</div>

<!-- CONV MODE -->
<div id="conv-mode">
  <div class="conv-messages" id="conv-messages">
    <div style="text-align:center;color:var(--text3);padding:2rem;font-size:14px">
      选择说话身份，按住按钮开始对话<br><br>
      松开后自动翻译并朗读给对方
    </div>
  </div>
  <div class="status-text" id="conv-status">选择一方开始</div>
  <div class="conv-controls">
    <button class="conv-btn conv-btn-zh" id="conv-zh" onclick="convListen('zh')">
      🇨🇳 我说中文
    </button>
    <button class="conv-btn conv-btn-en" id="conv-en" onclick="convListen('en')">
      🇺🇸 English
    </button>
  </div>
</div>

<!-- History Overlay -->
<div class="overlay" id="hist-overlay" onclick="e=>e.target===this&&closeHistory()">
  <div class="overlay-sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="sheet-title">历史记录</div>
      <button onclick="closeHistory()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">✕</button>
    </div>
    <div class="sheet-list" id="hist-list"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let srcLang = 'zh-CN', tgtLang = 'en-US';
let isListening = false;
let recognition = null;
let currentTrans = '';
let history = [];
let deferredPrompt = null;
let convListening = false;
let convRecog = null;
let convInterimEl = null;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// ── PWA Install ────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
}

// ── Service Worker ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Helpers ────────────────────────────────────────────────────────────
function toast(msg, dur=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function setStatus(msg, id='status-text') {
  document.getElementById(id).textContent = msg;
}

// ── Mode switch ────────────────────────────────────────────────────────
function switchMode(m) {
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(m==='single'&&i===0)||(m==='conv'&&i===1)));
  document.getElementById('single-mode').style.display = m==='single' ? 'flex' : 'none';
  document.getElementById('conv-mode').style.display = m==='conv' ? 'flex' : 'none';
  if (isListening) stopListen();
  if (convListening) stopConv();
}

// ── Lang swap ──────────────────────────────────────────────────────────
function swapLang() {
  [srcLang, tgtLang] = [tgtLang, srcLang];
  const zh = srcLang === 'zh-CN';
  document.getElementById('src-flag').textContent = zh ? '🇨🇳' : '🇺🇸';
  document.getElementById('src-name').textContent = zh ? '中文' : 'English';
  document.getElementById('tgt-flag').textContent = zh ? '🇺🇸' : '🇨🇳';
  document.getElementById('tgt-name').textContent = zh ? '英文' : '中文';
  document.getElementById('src-label').textContent = zh ? '您说（中文）' : 'You speak (English)';
  document.getElementById('tgt-label').textContent = zh ? '翻译结果（英文）' : '翻译结果（中文）';
  clearAll();
}

// ── Translation API ────────────────────────────────────────────────────
async function translate(text, from, to) {
  const fromName = from === 'zh-CN' ? 'Chinese' : 'English';
  const toName = to === 'en-US' ? 'English' : 'Chinese';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `Translate from ${fromName} to ${toName}. Return ONLY the translated text.\n\n${text}`
      }]
    })
  });
  const d = await res.json();
  return d.content?.[0]?.text?.trim() || '';
}

// ── Single Mode ────────────────────────────────────────────────────────
function toggleListen() {
  if (isListening) { stopListen(); return; }
  if (!SR) { toast('请使用 Chrome 浏览器以支持语音识别'); return; }
  startListen();
}

function startListen() {
  recognition = new SR();
  recognition.lang = srcLang;
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-btn').textContent = '⏹';
    document.getElementById('src-dot').className = 'panel-dot listening';
    document.getElementById('src-text').className = 'panel-text interim';
    document.getElementById('src-text').textContent = '聆听中…';
    setStatus('正在聆听，说完稍作停顿');
  };

  let finalBuf = '', timer = null;

  recognition.onresult = async e => {
    let interim = '';
    finalBuf = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalBuf += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const shown = finalBuf || interim;
    document.getElementById('src-text').className = 'panel-text' + (finalBuf ? '' : ' interim');
    document.getElementById('src-text').textContent = shown || '聆听中…';

    if (finalBuf) {
      clearTimeout(timer);
      timer = setTimeout(async () => {
        document.getElementById('tgt-dot').className = 'panel-dot translating';
        setStatus('翻译中…');
        try {
          const t = await translate(finalBuf, srcLang, tgtLang);
          currentTrans = t;
          document.getElementById('tgt-text').className = 'trans-text';
          document.getElementById('tgt-text').textContent = t;
          document.getElementById('tgt-dot').className = 'panel-dot done';
          document.getElementById('action-row').style.display = 'flex';
          setStatus('翻译完成 · 可继续说话');
        } catch {
          document.getElementById('tgt-dot').className = 'panel-dot';
          setStatus('翻译失败，请检查网络');
        }
      }, 700);
    }
  };

  recognition.onerror = e => {
    if (e.error === 'not-allowed') toast('需要麦克风权限：请在浏览器设置中允许');
    else if (e.error !== 'aborted') toast('语音识别出错：' + e.error);
    stopListen();
  };

  recognition.onend = () => {
    if (isListening) setTimeout(() => recognition && recognition.start(), 200);
  };

  recognition.start();
}

function stopListen() {
  isListening = false;
  if (recognition) { recognition.stop(); recognition = null; }
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-btn').textContent = '🎙';
  document.getElementById('src-dot').className = 'panel-dot';
  setStatus('已停止 · 点击麦克风继续');
  const src = document.getElementById('src-text').textContent;
  const tgt = document.getElementById('tgt-text').textContent;
  if (src && currentTrans) addHistory(src, currentTrans);
}

function speakTrans() {
  if (!currentTrans) return;
  const u = new SpeechSynthesisUtterance(currentTrans);
  u.lang = tgtLang; u.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
  document.getElementById('tgt-dot').className = 'panel-dot translating';
  u.onend = () => document.getElementById('tgt-dot').className = 'panel-dot done';
}

function copyText() {
  navigator.clipboard?.writeText(currentTrans).then(() => toast('已复制到剪贴板'));
}

function clearAll() {
  if (isListening) stopListen();
  document.getElementById('src-text').className = 'panel-text placeholder';
  document.getElementById('src-text').textContent = '点击下方麦克风开始说话…';
  document.getElementById('tgt-text').className = 'trans-text placeholder';
  document.getElementById('tgt-text').textContent = '翻译将在这里显示…';
  document.getElementById('action-row').style.display = 'none';
  document.getElementById('src-dot').className = 'panel-dot';
  document.getElementById('tgt-dot').className = 'panel-dot';
  currentTrans = '';
  setStatus('准备就绪');
}

// ── History ─────────────────────────────────────────────────────────────
function addHistory(src, tgt) {
  history.unshift({ src, tgt });
  if (history.length > 20) history.pop();
}

function openHistory() {
  const list = document.getElementById('hist-list');
  if (history.length === 0) {
    list.innerHTML = '<div class="hist-empty">暂无历史记录</div>';
  } else {
    list.innerHTML = history.map(h => `
      <div class="hist-item">
        <div class="hist-orig">${h.src}</div>
        <div class="hist-trans">${h.tgt}</div>
      </div>`).join('');
  }
  document.getElementById('hist-overlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('hist-overlay').classList.remove('open');
}

document.getElementById('hist-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('hist-overlay')) closeHistory();
});

// ── Conversation Mode ──────────────────────────────────────────────────
function convListen(who) {
  if (convListening) { stopConv(); return; }
  if (!SR) { toast('请使用 Chrome 浏览器'); return; }

  const lang = who === 'zh' ? 'zh-CN' : 'en-US';
  const fromL = lang, toL = who === 'zh' ? 'en-US' : 'zh-CN';

  convRecog = new SR();
  convRecog.lang = lang;
  convRecog.continuous = false;
  convRecog.interimResults = true;

  const zhBtn = document.getElementById('conv-zh');
  const enBtn = document.getElementById('conv-en');

  convRecog.onstart = () => {
    convListening = true;
    if (who === 'zh') { zhBtn.classList.add('active'); zhBtn.textContent = '🎙 聆听中…'; }
    else { enBtn.classList.add('active'); enBtn.textContent = '🎙 Listening…'; }
    setStatus(who === 'zh' ? '请说中文…' : 'Please speak English…', 'conv-status');
    addConvInterim(who, '…');
  };

  let interim = '';
  convRecog.onresult = e => {
    interim = '';
    let final = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (final) interim = final;
    updateConvInterim(interim);
  };

  convRecog.onend = async () => {
    convListening = false;
    zhBtn.classList.remove('active'); zhBtn.textContent = '🇨🇳 我说中文';
    enBtn.classList.remove('active'); enBtn.textContent = '🇺🇸 English';

    if (interim) {
      setStatus('翻译中…', 'conv-status');
      try {
        const trans = await translate(interim, fromL, toL);
        finalizeConv(who, interim, trans);
        setStatus('完成，选择另一方继续', 'conv-status');
        const u = new SpeechSynthesisUtterance(trans);
        u.lang = toL; u.rate = 0.9;
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      } catch {
        removeInterim();
        setStatus('翻译失败', 'conv-status');
      }
    } else {
      removeInterim();
      setStatus('未检测到语音，请重试', 'conv-status');
    }
    interim = '';
    convRecog = null;
  };

  convRecog.onerror = e => {
    if (e.error === 'not-allowed') toast('需要麦克风权限');
    stopConv();
  };

  convRecog.start();
}

function stopConv() {
  convListening = false;
  if (convRecog) { convRecog.stop(); convRecog = null; }
}

function addConvInterim(who, text) {
  const c = document.getElementById('conv-messages');
  if (c.children.length === 1 && c.children[0].tagName !== 'DIV'.toUpperCase()) return;
  convInterimEl = document.createElement('div');
  convInterimEl.className = 'msg-bubble ' + (who === 'zh' ? 'zh-msg' : 'en-msg');
  convInterimEl.style.opacity = '0.5';
  convInterimEl.textContent = text;
  c.appendChild(convInterimEl);
  c.scrollTop = c.scrollHeight;
}

function updateConvInterim(text) {
  if (convInterimEl) { convInterimEl.textContent = text; }
  const c = document.getElementById('conv-messages');
  c.scrollTop = c.scrollHeight;
}

function removeInterim() {
  if (convInterimEl) { convInterimEl.remove(); convInterimEl = null; }
}

function finalizeConv(who, orig, trans) {
  removeInterim();
  const c = document.getElementById('conv-messages');
  if (c.children.length === 1 && c.children[0].style.textAlign === 'center') c.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'msg-group';

  const b1 = document.createElement('div');
  b1.className = 'msg-bubble ' + (who === 'zh' ? 'zh-msg' : 'en-msg');
  b1.textContent = orig;

  const s1 = document.createElement('div');
  s1.className = 'msg-sub' + (who === 'zh' ? '' : ' right');
  s1.textContent = who === 'zh' ? '🇨🇳 原文' : '🇺🇸 Original';

  const b2 = document.createElement('div');
  b2.className = 'msg-bubble ' + (who === 'zh' ? 'en-msg' : 'zh-msg');
  b2.textContent = trans;

  const s2 = document.createElement('div');
  s2.className = 'msg-sub' + (who === 'zh' ? ' right' : '');
  s2.textContent = who === 'zh' ? '🇺🇸 翻译' : '🇨🇳 翻译';

  wrap.append(b1, s1, b2, s2);
  c.appendChild(wrap);
  c.scrollTop = c.scrollHeight;
}
</script>
